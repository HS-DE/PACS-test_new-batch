name: PACS multi-strategy benchmark

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "script/**"
      - "data/**"
      - ".github/workflows/pacs-analysis.yml"

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("data.table","readxl","ggplot2"), repos="https://cloud.r-project.org")'

      - name: Run PACS benchmark
        run: Rscript script/run_all.R

      - name: Commit generated Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Results
          if git diff --cached --quiet; then
            echo "No result changes to commit."
          else
            git commit -m "Run PACS multi-strategy benchmark"
            git push
          fi
